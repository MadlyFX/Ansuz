<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>E2E Config</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #1e1e22;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            width: 900px;
            height: 800px;
            outline: none;
        }
    </style>
</head>
<body>
    <canvas id="ansuz-canvas" width="900" height="800" tabindex="0"></canvas>

    <script src="odin.js"></script>
    <script>
        const INITIAL_PAGES = 2000;
        const MAX_PAGES = 65536;
        const mem = new WebAssembly.Memory({
            initial: INITIAL_PAGES,
            maximum: MAX_PAGES,
        });

        const memInterface = new odin.WasmMemoryInterface();
        memInterface.setMemory(mem);

        const canvas = document.getElementById("ansuz-canvas");
        canvas.focus();

        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            if (memInterface.exports && memInterface.exports._ansuz_set_mouse) {
                memInterface.exports._ansuz_set_mouse(
                    (e.clientX - rect.left) * scaleX,
                    (e.clientY - rect.top) * scaleY
                );
            }
        });

        canvas.addEventListener("mousedown", (e) => {
            canvas.focus();
            if (memInterface.exports && memInterface.exports._ansuz_set_mouse_button) {
                memInterface.exports._ansuz_set_mouse_button(1);
            }
        });

        canvas.addEventListener("mouseup", (e) => {
            if (memInterface.exports && memInterface.exports._ansuz_set_mouse_button) {
                memInterface.exports._ansuz_set_mouse_button(0);
            }
        });

        canvas.addEventListener("wheel", (e) => {
            if (memInterface.exports && memInterface.exports._ansuz_mouse_wheel) {
                const delta = -Math.sign(e.deltaY);
                memInterface.exports._ansuz_mouse_wheel(delta);
            }
            e.preventDefault();
        }, { passive: false });

        const KEY_MAP = {
            "Backspace": 8,  "Delete": 46,
            "ArrowLeft": 37, "ArrowRight": 39,
            "ArrowUp": 38,   "ArrowDown": 40,
            "Home": 36,      "End": 35,
            "Enter": 13,     "Shift": 16, "Control": 17,
        };

        const PREVENT_DEFAULT = new Set([
            "Backspace", "Tab", "ArrowUp", "ArrowDown",
            "ArrowLeft", "ArrowRight", "Home", "End",
        ]);

        canvas.addEventListener("keydown", (e) => {
            if (!memInterface.exports) return;
            const code = KEY_MAP[e.key];
            if (code !== undefined) {
                memInterface.exports._ansuz_key_down(code);
            }
            if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
                memInterface.exports._ansuz_text_input(e.key.charCodeAt(0));
            }
            if (PREVENT_DEFAULT.has(e.key)) {
                e.preventDefault();
            }
        });

        canvas.addEventListener("keyup", (e) => {
            if (!memInterface.exports) return;
            const code = KEY_MAP[e.key];
            if (code !== undefined) {
                memInterface.exports._ansuz_key_up(code);
            }
        });

        // Poll for pending config save and trigger browser download
        setInterval(() => {
            if (!memInterface.exports) return;
            if (!memInterface.exports._ansuz_save_pending) return;
            if (memInterface.exports._ansuz_save_pending()) {
                const ptr = memInterface.exports._ansuz_get_json_ptr();
                const len = memInterface.exports._ansuz_get_json_len();
                const bytes = new Uint8Array(mem.buffer, ptr, len);
                const text = new TextDecoder().decode(bytes);
                const blob = new Blob([text], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "e2e_config.json";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }, 16);

        odin.runWasm("e2econfig.wasm", null, null, memInterface, 8);
    </script>
</body>
</html>
